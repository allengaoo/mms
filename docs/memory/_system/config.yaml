# ════════════════════════════════════════════════════════════════════════════
# MDP Memory System — 系统配置
# 版本：v2.2 | 更新于：2026-04-15 | EP-115
#
# 文件结构总览：
#   system          — 项目元信息
#   layers          — 记忆层级定义（L1~L5 + CC）
#   dimensions      — 工程维度定义（D1~D10）
#   tiers           — 记忆热度分层（hot / warm / cold / archive）
#   id_prefixes     — 记忆 ID 前缀约定
#   soft_links      — 跨维度软链接策略
#   gc              — 垃圾回收配置
#   distillation    — 知识蒸馏配置
#   llm             — LLM Provider 配置与自动探测顺序
#   model_router    — 任务 → 模型路由映射
#   resilience      — 重试 / 断点 / 熔断器配置
#   observability   — 审计日志 / 访问日志 / Trace ID
#   performance     — 索引缓存 / 文件缓存 TTL
#   collaboration   — 多人协作冲突检测配置
#   synthesize      — mms synthesize 命令的三级检索漏斗配置（v2.2 新增）
# ════════════════════════════════════════════════════════════════════════════

# ── 项目元信息 ──────────────────────────────────────────────────────────────
system:
  version: "2.3"
  project: "OntoForge (MDP Enterprise Platform)"
  created_at: "2026-04-11"
  updated_at: "2026-04-18"   # 每次修改此文件时更新
  source_ep: "EP-107"        # 首次创建本文件的 EP 编号
  last_ep: "EP-127"          # 最近一次修改本文件的 EP 编号


# ── 记忆层级定义 ─────────────────────────────────────────────────────────────
# 与软件架构的分层对齐，决定记忆文件的存放路径和检索优先级
layers:
  L1: { name: "platform",        desc: "横切关注点（安全/可观测/配置）" }
  L2: { name: "infrastructure",  desc: "基础设施适配器（DB/Kafka/Redis/Iceberg）" }
  L3: { name: "domain",          desc: "领域业务逻辑（本体/数据管道/治理/仿真）" }
  L4: { name: "application",     desc: "应用服务层（Control/Query/Worker/Dispatch）" }
  L5: { name: "interface",       desc: "接口层（API/前端/测试）" }
  CC: { name: "cross_cutting",   desc: "跨层模式与架构决策（ADR、反模式）" }


# ── 工程维度定义 ─────────────────────────────────────────────────────────────
# 10 个工业级工程维度，作为记忆文件 YAML Front Matter 中 dimension 字段的枚举值
dimensions:
  D1:  { name: "security",        layer_primary: "L1", desc: "安全与多租户（RLS/SecurityContext/RBAC）" }
  D2:  { name: "architecture",    layer_primary: "L4", desc: "架构边界（CQRS/六边形/Control-Data 分离）" }
  D3:  { name: "observability",   layer_primary: "L1", desc: "可观测性（structlog/trace_id/Prometheus）" }
  D4:  { name: "resilience",      layer_primary: "L2", desc: "弹性与事务（Tenacity/熔断/事务策略）" }
  D5:  { name: "distributed",     layer_primary: "L2", desc: "分布式协调（Leader Election/Fencing Token）" }
  D6:  { name: "bigdata",         layer_primary: "L2", desc: "大数据与事件驱动（Kafka/Avro/Iceberg）" }
  D7:  { name: "performance",     layer_primary: "L2", desc: "性能与缓存（@cached/Redis/N+1 防护）" }
  D8:  { name: "api_standards",   layer_primary: "L5", desc: "API 规范（信封格式/错误码/kebab-case URL）" }
  D9:  { name: "database",        layer_primary: "L2", desc: "数据库与迁移（MySQL/Alembic/事务策略）" }
  D10: { name: "testing",         layer_primary: "L5", desc: "测试覆盖（pytest/vitest/Polyfactory/MSW）" }


# ── 记忆热度分层（LFU 淘汰策略） ─────────────────────────────────────────────
# hot：高频访问，优先注入 LLM 上下文
# warm：中频，按需注入
# cold：低频，仅在全量检索时包含
# archive：长期未访问，移入归档目录（不影响日常检索）
tiers:
  hot:
    max_count: 20                   # hot 区最多保留 20 条（超出时 LFU 降级）
    min_access_count: 3             # 访问次数 ≥ 3 才可升入 hot
    max_days_since_access: 30       # 超过 30 天未访问自动降级为 warm
  warm:
    max_count: 60                   # warm 区最多保留 60 条
    min_access_count: 1             # 访问次数 ≥ 1 才可保持 warm
    max_days_since_access: 90       # 超过 90 天未访问降级为 cold
  cold:
    max_days_since_access: 180      # 超过 180 天未访问触发归档（移入 archive/）
  archive:
    retention_months: 12            # 归档记忆保留 12 个月后可永久删除


# ── 记忆 ID 前缀约定 ──────────────────────────────────────────────────────────
# 用于快速识别记忆类型，避免 ID 命名冲突
id_prefixes:
  lesson:   "MEM-L"    # 经验教训（来自 EP 的 LESSONS_LEARNED 节）
  decision: "AD"       # 架构决策（来自 EP 的 ACTIVE_DECISIONS 节）
  error:    "MEM-E"    # 已知错误（来自 ISSUE-REGISTRY）
  pattern:  "PAT"      # 提炼后的设计模式（从多条 lesson 合并）
  skill:    "SKL"      # 演进型 Skill（链接 .cursor/skills/ 目录）
  biz:      "BIZ"      # 业务流程记忆（来自 BIZ-memory 模板）


# ── 软链接策略（跨维度记忆关联） ─────────────────────────────────────────────
# 同一知识点可能同时属于多个层/维度，通过软链接避免重复存储
soft_links:
  enabled: true
  max_links_per_memory: 3          # 每条记忆最多关联 3 个软链接节点
  link_field: "also_in"            # 记忆 Front Matter 中的软链接字段名


# ── GC 配置（垃圾回收） ────────────────────────────────────────────────────────
gc:
  run_after_ep: true               # 每次 EP 结束后自动运行 GC（mms postcheck 触发）
  hot_overflow_strategy: "lfu"     # hot 区超限时：按访问频率淘汰最低的（LFU）
  archive_strategy: "move_file"    # 归档时：移动文件到 archive/{YYYY-MM}/ 目录


# ── 蒸馏配置（从 EP 提取新记忆的策略） ───────────────────────────────────────
distillation:
  pattern_threshold: 2             # 同类 lesson ≥ 2 条时，触发模式（pattern）提炼
  skill_threshold: 3               # 同类 pattern ≥ 3 次时，触发 Skill 生成
  min_ep_success_for_skill: 3      # Skill 生成需要 ≥ 3 次成功 EP 验收（防止噪音 Skill）


# ── LLM Provider 配置 ─────────────────────────────────────────────────────────
llm:
  # 自动探测顺序：按 fallback_chain 依次尝试，第一个可用的生效
  provider: auto                   # auto | ollama_r1 | ollama_coder | bailian | claude

  fallback_chain:
    - bailian                      # 百炼（DashScope）qwen3-32b，首选（稳定、可联网）
    - ollama_r1                    # deepseek-r1:8b，本地推理（离线可用）
    - ollama_coder                 # deepseek-coder-v2:16b，本地代码生成
    - claude                       # Claude Sonnet（Pending 模式，需人工处理）

  ollama:
    base_url: "${OLLAMA_BASE_URL:-http://localhost:11434}"
    connect_timeout_seconds: 3     # 连接超时：超出则跳过 Ollama，使用下一个 Provider
    generate_timeout_seconds: 120  # 生成超时：120 秒内未完成则失败
    models:
      reasoning:  "${OLLAMA_MODEL_REASONING:-deepseek-r1:8b}"
      coding:     "${OLLAMA_MODEL_CODING:-deepseek-coder-v2:16b}"
      embedding:  "${OLLAMA_MODEL_EMBEDDING:-nomic-embed-text}"

  google:
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    connect_timeout_seconds: 8     # 健康检查超时
    generate_timeout_seconds: 180  # 生成请求超时
    min_output_tokens: 8192        # gemini-2.5-pro thinking 模式：max_tokens 最小保障值（防 thinking 吞尽 token）
    models:
      orchestration: "${GOOGLE_MODEL_ORCHESTRATION:-gemini-2.5-pro}"  # DAG 编排
      code_review:   "${GOOGLE_MODEL_CODE_REVIEW:-gemini-2.5-pro}"    # 代码语义评审

  claude:
    model: "claude-sonnet-4-6"     # 标签仅用于审计，实际为 Pending 模式（人工粘贴提示词）
    pending_prompt_dir: "_system/pending_claude_prompts"  # 待人工处理的提示词存放目录


# ── 多模型路由器（任务 → 模型映射） ─────────────────────────────────────────
# 不同任务类型使用不同的模型，平衡速度与质量
model_router:
  tasks:
    distillation:
      model: bailian_plus          # EP 知识蒸馏：qwen3-32b，推理能力强
      max_input_tokens: 8000
      desc: "EP 知识蒸馏，需要推理能力"
    context_compression:
      model: bailian_plus          # 长上下文压缩（30K→2K token），qwen3-32b 理解能力强
      max_input_tokens: 30000
      desc: "长上下文压缩，30K→2K token"
    task_routing:
      model: bailian_plus          # 判断任务 Layer/Dimension，qwen3-32b 分类任务
      max_input_tokens: 3000
      desc: "判断任务 Layer/Dimension，选 prompt 模板"
    code_review:
      model: gemini                # 代码语义评审：gemini-2.5-pro（1M 上下文，强推理）
      max_input_tokens: 50000
      desc: "双模型对比语义评审，对照 18 条红线分析 qwen vs sonnet 差异"
    dag_orchestration:
      model: gemini                # DAG 编排：gemini-2.5-pro（理解完整 EP 架构）
      max_input_tokens: 50000
      desc: "将 EP 分解为原子 Unit DAG，由 Gemini 2.5 Pro 规划"
    code_generation_simple:
      model: bailian_coder         # 单文件/简单代码生成，qwen3-coder-next 效率更高
      max_input_tokens: 4000
      desc: "单文件/简单代码生成（有记忆辅助）"
    complex_architecture:
      model: gemini                # 复杂架构变更：gemini-2.5-pro（1M 上下文）
      max_input_tokens: 100000
      desc: "跨层架构变更，Gemini 2.5 Pro 分析（B 路径仍可在 Cursor 中手动 Sonnet）"

  duplicate_detection:
    enabled: true
    backend: embedding             # embedding | tag_overlap（无向量时用 tag_overlap）
    similarity_threshold: 0.85    # 余弦相似度阈值（embedding 模式）/ Jaccard 阈值（tag_overlap 模式）


# ── 韧性配置 ────────────────────────────────────────────────────────────────
resilience:
  retry:
    max_attempts: 3                # LLM 调用最多重试 3 次（含首次）
    wait_min_seconds: 1.0          # 首次重试等待 1 秒
    wait_max_seconds: 10.0         # 重试等待上限 10 秒
    wait_multiplier: 2.0           # 指数退避系数：1s → 2s → 4s → (max 10s)
  checkpoint:
    enabled: true                  # 蒸馏中途失败时保存断点，下次可续跑
    dir: "_system/checkpoints"     # 断点文件存放目录（相对于 docs/memory/）
  circuit_breaker:
    failure_threshold: 3           # 连续 N 次失败后开路（拒绝新请求）
    recovery_timeout_seconds: 60   # 开路后 N 秒进入半开状态（允许一次试探）
    state_file: "_system/circuit_state.json"  # 熔断器状态持久化文件


# ── 可观测性配置 ──────────────────────────────────────────────────────────────
observability:
  audit_log: "_system/audit.jsonl"         # 操作审计日志（op/result/elapsed_ms）
  access_log: "_system/access_log.jsonl"   # 记忆访问日志（哪条记忆被读了几次）
  trace_id_format: "MMS-{YYYYMMDD}-{6hex}" # Trace ID 格式，用于跨操作关联


# ── 性能配置 ────────────────────────────────────────────────────────────────
performance:
  index_cache_ttl_seconds: 300     # MEMORY_INDEX.json 在进程内存中的缓存 TTL（秒）
  memory_file_cache_ttl_seconds: 600  # 热记忆文件内容的进程内缓存 TTL（秒）
  index_update_mode: incremental   # 索引更新策略：full（重建）| incremental（增量）
  max_hot_memories_cached: 20      # 进程内最多缓存多少条 hot 记忆的内容（内存保护）


# ── 协作配置（多人协作冲突检测） ────────────────────────────────────────────
collaboration:
  schema_validation: true          # 写入记忆前必须通过 schema.json 校验
  conflict_detection: true         # 写入前检查 version 字段，防止并发覆盖
  version_field: true              # 所有 MEM-*.md 必须在 Front Matter 中有 version 字段
  schema_file: "_system/schema.json"  # JSON Schema 校验规则文件


# ════════════════════════════════════════════════════════════════════════════
# synthesize 配置（v2.2 新增）
# mms synthesize 命令的三级检索漏斗行为控制
#
# 三级漏斗说明：
#   第一级  历史任务相似匹配（Jaccard + 时间衰减，无 LLM）
#           → 命中时：用历史验证过的 hit_files/hit_memories 约束 LLM，减少幻觉
#   第二级  记忆关键词匹配（injector.py 的增强版，无 LLM）
#           → 命中时：组合相关记忆片段 + codemap 文件路径
#   第三级  极简知识索引兜底（task_quickmap.yaml，纯静态，毫秒级）
#           → 始终有输出：返回任务类型的最小必读文件列表
# ════════════════════════════════════════════════════════════════════════════
synthesize:

  # ── 第一级：历史任务相似匹配 ────────────────────────────────────────────
  history:
    enabled: true                  # 是否启用历史任务相似匹配（第一级）

    history_file: "_system/task_history.jsonl"
    # 历史记录文件路径（相对于 docs/memory/）。
    # 此文件由 git 追踪，多人协作时通过 git pull 获取团队历史。

    history_top_x: 10
    # 个人任务查找范围：优先从当前用户（author 字段匹配）最近 x 条记录中搜索。
    # 增大可提高个人历史命中率，但计算量略增（仍为毫秒级）。

    shared_top_y: 20
    # 团队任务查找范围：个人未命中时，从全量最近 y 条记录中搜索（含他人记录）。
    # 建议 shared_top_y ≥ history_top_x。

    similarity_threshold: 0.30
    # Jaccard 相似度命中阈值 [0.0, 1.0]。
    # - 低于此值视为"不相似"，进入第二级。
    # - 0.30 表示：两个任务至少 30% 的标签重合。
    # - 调低（如 0.20）：命中更宽松，可能引入弱相关任务。
    # - 调高（如 0.50）：命中更严格，未命中时更频繁走第二/三级。

    time_decay:
      recent_days: 7               # 距今 ≤ 7 天的历史任务权重 × 1.0（完全信任）
      medium_days: 30              # 距今 8~30 天的历史任务权重 × medium_weight
      medium_weight: 0.7           # 中等时效的衰减系数（7~30 天）
      old_weight: 0.4              # 30 天以前的衰减系数（较旧记录可信度降低）

    max_history_records: 500
    # task_history.jsonl 的最大行数。
    # 超出时自动滚动删除最旧的记录，防止文件无限增长。

    author_field_enabled: true
    # 是否在历史记录中记录 author 字段。
    # true：个人查找阶段优先命中同一 author 的历史（多人协作友好）。
    # false：所有记录平等对待（单人项目可关闭）。

  # ── 第一级命中时的 LLM 行为策略 ────────────────────────────────────────
  on_history_hit:
    strategy: "constrain"
    # "constrain"（方案 B，推荐）：
    #   仍调用 LLM，但将历史任务的 hit_files/hit_memories 作为"参考真实路径"
    #   注入 prompt，减少文件路径幻觉，同时保留 LLM 的灵活性（可生成新内容）。
    # "skip_llm"（方案 A，最快）：
    #   直接复用历史 hit_files/hit_memories，跳过 LLM 记忆检索阶段，
    #   只用 LLM 生成最终提示词文本（速度最快，0 幻觉路径，但灵活性最低）。

    max_files_from_history: 5
    # 从历史命中记录中最多复用多少个 hit_files 注入 prompt。
    # 避免历史任务文件列表过长导致 token 超限。

  # ── 第二级：记忆关键词匹配（injector.py 增强） ───────────────────────────
  memory_search:
    enabled: true                  # 是否启用第二级关键词记忆匹配
    top_k: 5                       # 最多注入多少条记忆（与 mms inject --top-k 同义）
    compress: true                 # 是否对超长记忆内容做摘要压缩（节省 token）

  # ── 第三级：极简知识索引兜底 ──────────────────────────────────────────────
  quickmap:
    enabled: true                  # 是否启用第三级静态快速映射（建议始终开启）
    file: "_system/task_quickmap.yaml"
    # 静态映射文件路径（相对于 docs/memory/）。
    # 任务类型未知时降级为 universal_context（始终不为空）。

  # ── codemap / funcmap 上下文注入（合成 prompt 增强） ─────────────────────
  context_injection:
    codemap_max_chars: 3000
    # 注入 codemap 目录快照时的最大字符数。
    # 超出时截断（优先保留与模板类型相关的章节）。

    funcmap_max_lines: 40
    # 从 funcmap 函数签名索引中最多提取多少行（关键词匹配后的结果上限）。

    e2e_context_max_chars: 2000
    # 从 e2e_traceability.md 中注入的章节切片最大字符数。

  # ── 历史记录写入控制 ────────────────────────────────────────────────────
  record_after_synthesize: true
  # 每次 synthesize 完成后，是否将本次任务写入 task_history.jsonl。
  # true（推荐）：持续积累历史，下次类似任务自动复用。
  # false：不记录（调试 / 隐私场景时可临时关闭）。


# ════════════════════════════════════════════════════════════════════════════
# DAG 编排配置（EP-116 预留节）
#
# 背景：基于数据库优化器类比，将复杂跨层任务分解为 DAG（有向无环图），
#       由编排 Agent（capable model）规划，执行 Agent（small model）原子执行。
#
# 当前状态：enabled: false（EP-117 实现 mms unit 命令后启用）
# 参考文档：docs/context/layer_contracts.md §DAG 层依赖规则
# ════════════════════════════════════════════════════════════════════════════
dag:
  enabled: true                    # EP-117 实现完成，mms unit 命令已可用

  orchestrator_model: gemini        # DAG 生成使用 gemini-2.5-pro（EP-122，1M 上下文强推理）
  executor_model: bailian_coder     # 原子 Unit 执行使用 qwen3-coder-next（或本地小模型）

  # ── 原子化阈值（判断 Unit 是否适合小模型执行）─────────────────────────
  atomicity_thresholds:
    max_files_per_unit: 2           # 每个原子 Unit 最多涉及 2 个文件（业务 + 测试）
    max_context_tokens_8b: 4000     # 适配 8B 模型的有效上下文窗口上限
    max_context_tokens_16b: 8000    # 适配 16B 模型的有效上下文窗口上限
    require_auto_verification: true # 原子 Unit 必须可被 arch_check / pytest 自动验证
    score_threshold_8b: 0.75        # 原子化评分 ≥ 该值才判定为适合 8B 模型
    score_threshold_16b: 0.50       # 原子化评分 ≥ 该值才判定为适合 16B 模型
    annotate_threshold_high: 0.85   # unit_generate 标注：score≥此值尝试 8B
    annotate_threshold_mid: 0.60    # unit_generate 标注：score≥此值尝试 16B
    report_threshold: 0.75          # unit_generate 概览：达到此分认为满足标准

  # ── DAG 生成 LLM 配置 ──────────────────────────────────────────────────
  generation:
    max_tokens: 8192                # DAG 生成 LLM 调用的 max_tokens（gemini thinking 需要足够空间）
    max_tokens_retry_multiplier: 2  # MAX_TOKENS 错误时自动翻倍重试（翻倍上限：max_tokens × 此值）

  # ── 状态传递协议 ───────────────────────────────────────────────────────
  state_transfer: git_commit        # Sub-agent 间通过 git commit 传递状态
  # 说明：每个 Unit 执行完成后提交一个 git commit，
  #       下一个 Unit 从当前 git 状态读取上下文（而非依赖计划中的"预期输出"）

  # ── 层依赖顺序（DAG 生成时的约束）───────────────────────────────────────
  layer_order:
    # 数字越小，执行越早（数字相同可并行）
    - { layer: L3_domain,         order: 1 }   # 数据模型先行
    - { layer: L4_application,    order: 2 }   # 服务层依赖模型
    - { layer: L5_interface,      order: 3 }   # API/前端依赖服务
    - { layer: L2_infrastructure, order: 1 }   # 基础设施可与模型并行
    - { layer: testing,           order: 4 }   # 测试最后（或与业务同层）
    - { layer: docs,              order: 5 }   # 文档同步最后


# ════════════════════════════════════════════════════════════════════════════
# autoDream 配置（EP-118 新增）
#
# autoDream 是学习闭环的关键组件：EP 执行完毕后，自动从 git commit 历史和
# EP 文件的 Surprises & Discoveries / Decision Log 节中提取知识候选，
# 通过 LLM 生成记忆草稿，人工审核后提升为正式 MEM-*.md 文件。
#
# 工作流：mms postcheck → 建议 mms dream → mms dream --promote → mms gc
# ════════════════════════════════════════════════════════════════════════════
dream:
  enabled: true                    # EP-118 实现完成，mms dream 命令已可用

  # ── 草稿存放目录 ──────────────────────────────────────────────────────
  draft_dir: "private/dream"       # 相对于 docs/memory/，草稿文件临时存放目录
  # 草稿文件命名格式：DRAFT-{YYYY-MM-DD}-{序号}.md
  # promote 完成后草稿文件自动删除，正式记忆写入 shared/ 对应层级目录

  # ── 触发策略 ──────────────────────────────────────────────────────────
  trigger:
    after_n_units: 3               # 每完成 N 个 Unit 后，postcheck 自动建议运行 dream
    on_postcheck_pass: true        # postcheck PASS 时，总是在报告末尾打印 dream 提示
    min_input_required: true       # 至少有 1 条相关 commit 或 1 个非空 EP 章节才触发

  # ── git 历史读取 ─────────────────────────────────────────────────────
  git:
    default_since: "7d"            # 默认读取近 7 天的 commit（--since 参数的默认值）
    max_commits: 20                # 每次萃取最多读取 20 条 commit（防止 prompt 过长）
    ep_filter: true                # 是否按 EP 编号过滤 commit（推荐开启）

  # ── LLM 配置 ─────────────────────────────────────────────────────────
  llm:
    task: distillation             # 复用 distillation 任务的 LLM 路由（qwen3-32b）
    max_output_tokens: 3000        # 草稿生成最大 token 数（1-3 条草稿约需 1500-2500）

  # ── 草稿质量控制 ─────────────────────────────────────────────────────
  quality:
    max_drafts_per_run: 3          # 每次萃取最多保存 3 条草稿（防止噪音泛滥）
    require_where_how_when: true   # 草稿必须包含 WHERE/HOW/WHEN 三个章节


# ════════════════════════════════════════════════════════════════════════════
# 代码模板库配置（EP-118 新增）
#
# 为小模型提供「填空式」代码模板，降低幻觉率。
# 模板存放于 docs/memory/templates/code/，使用 {{variable_name}} 占位符。
# arch_constraints 变量从 layer_contracts.md 自动注入，无需用户提供。
# ════════════════════════════════════════════════════════════════════════════
template:
  enabled: true
  template_dir: "templates/code"   # 相对于 docs/memory/，模板文件存放目录
  # 模板文件格式：{name}.tmpl（YAML front-matter + --- + 代码模板体）
  # 变量占位符：{{variable_name}}
  # 自动注入变量：{{arch_constraints}}（来自 layer_contracts.md）

  # 内置模板列表（用于文档说明，实际以文件为准）
  builtin_templates:
    - name: service-method
      layer: L4_application
      desc: Service 层方法骨架（含 SecurityContext、AuditService、RLS 约束）
    - name: api-endpoint
      layer: L5_interface
      desc: FastAPI Endpoint + Schema（含信封格式、权限守卫）
    - name: react-list-page
      layer: L5_interface
      desc: ProTable 列表页（含 useQuery、PermissionGate、Zustand Store）
    - name: worker-job
      layer: L4_application
      desc: Worker Job（含 JobExecutionScope、structlog、无裸 try/except）


# ════════════════════════════════════════════════════════════════════════════
# mms unit run 执行引擎配置（EP-119 新增）
#
# 控制 LLM 自动执行 Unit 的行为，包括重试策略、沙箱安全设置和验证配置。
# 高风险参数：scope_guard_strict=false 会放行超出 unit.files 范围的写入，
# 除非明确测试需要，请保持默认值 true。
# ════════════════════════════════════════════════════════════════════════════
runner:
  enabled: true

  # ── 重试策略 ──────────────────────────────────────────────────────────────
  retry:
    max_retries: 2              # 最大重试次数（3-Strike：第 1 次 + 最多重试 2 次）
    retry_on_parse_fail: true   # LLM 输出解析失败时是否重试（true=重试，false=立即报错）
    retry_on_test_fail: true    # pytest 失败时是否重试（true=注入错误日志重试）
    retry_on_arch_fail: true    # arch_check 失败时是否重试

  # ── 沙箱与安全 ────────────────────────────────────────────────────────────
  sandbox:
    enabled: true               # 始终启用沙箱（禁用会导致失败后无法自动回滚，不推荐）

  scope_guard:
    strict: true                # true=违规文件直接拒绝；false=仅打印警告（开发调试用）
    # strict=false 适用场景：LLM 需要创建辅助文件（如测试 fixture）且
    # unit.files 遗漏了该文件时临时放宽，完成后应立即恢复 true

  # ── 语法预验证 ────────────────────────────────────────────────────────────
  pre_validate:
    python: true                # 用 ast.parse() 检查 .py 文件语法
    yaml: true                  # 用 yaml.safe_load() 检查 .yaml/.yml 文件
    json: true                  # 用 json.loads() 检查 .json 文件
    typescript: false           # TS 无法静态 parse，跳过（只做非空检查）

  # ── 确认交互 ─────────────────────────────────────────────────────────────
  confirm:
    require_confirm_for_replace: false  # replace action 是否默认需要 --confirm 确认
    # 建议：生产环境设为 true，避免意外覆盖关键文件

  # ── 超时配置 ─────────────────────────────────────────────────────────────
  timeout:
    llm_seconds: 180            # LLM 调用超时（秒）
    arch_check_seconds: 30      # arch_check 超时（秒）
    test_seconds: 120           # pytest 超时（秒）
    postcheck_test_seconds: 300 # postcheck 阶段 pytest 超时（允许更长的集成测试）
    postcheck_drift_seconds: 60 # postcheck doc_drift 检查超时（秒）
    unit_cmd_seconds: 120       # mms unit next/status 等子命令超时（秒）
    dream_git_seconds: 30       # dream 阶段 git log 读取超时（秒）
    synthesizer_index_seconds: 30  # synthesizer 刷新索引子进程超时（秒）

  # ── max_tokens 配置（按任务类型）──────────────────────────────────────────
  max_tokens:
    code_generation: 4096       # unit_runner：代码生成 LLM 调用 max_tokens
    code_review: 4096           # unit_compare：Gemini 语义评审 max_tokens
    distillation: 3000          # dream/synthesizer：蒸馏类任务 max_tokens
    intent_routing: 200         # intent_classifier：意图分类（极短输出）
    context_injection: 100      # injector：节点补充选择（极短输出）
    fix_gen: 2048               # fix_gen：修复代码生成 max_tokens

  # ── LLM 输出协议标记（不建议修改）────────────────────────────────────────
  output_protocol:
    begin_marker: "===BEGIN-CHANGES==="   # 变更块起始标记
    end_marker:   "===END-CHANGES==="     # 变更块结束标记
    file_end_marker: "===END-FILE==="     # 单文件结束标记
    allowed_actions:                      # 允许的写入动作
      - create                            # 新建文件
      - replace                           # 完整替换（最安全，不做增量 patch）


# ════════════════════════════════════════════════════════════════════════════
# 双模型代码对比配置（EP-120 新增）
#
# 工作流：
#   Step A: mms unit run --save-output   → qwen 输出存盘（不写业务文件）
#   Step B: Cursor Sonnet 生成代码       → mms unit sonnet-save（存 sonnet.txt）
#   Step C: mms unit compare             → 生成 report.md（机械 diff + 验证摘要）
#   Step D: Sonnet 在 Cursor 对话中读    → 语义评审，三选一（qwen/sonnet/merge）
#   Step E: mms unit compare --apply     → 应用选定版本 + git commit
# ════════════════════════════════════════════════════════════════════════════
compare:
  enabled: true

  # ── 存储路径 ──────────────────────────────────────────────────────────────
  storage:
    # 相对于项目根，对比文件存储目录
    # 结构：compare/<EP-ID>/<UNIT-ID>/{context.md, qwen.txt, sonnet.txt, report.md}
    base_dir: "docs/memory/private/compare"

  # ── 模型分配 ──────────────────────────────────────────────────────────────
  models:
    # EP 规划 / 意图识别：使用推理模型
    planning_model: "qwen3-32b"
    # DAG 编排：Gemini 2.5 Pro（1M 上下文，EP-122）
    orchestration_model: "gemini-2.5-pro"
    # Unit 代码生成（A 路径）：使用 coder 模型
    generation_model: "qwen3-coder-next"
    # Unit 代码生成（B 路径）：Cursor Sonnet 4.6（在 Cursor 对话中手动执行）
    sonnet_model: "cursor-sonnet-4.6"
    # 语义评审（自动，EP-122）：Gemini 2.5 Pro
    review_model: "gemini-2.5-pro"

  # ── diff 报告配置 ─────────────────────────────────────────────────────────
  report:
    max_diff_lines: 80              # diff 块最多显示行数（超出则截断并注明）
    include_arch_check: true        # 报告中包含 arch_check 基线结果
    include_pytest_summary: true    # 报告中包含 pytest 摘要（仅测试文件）
    # 语义评审 prompt 模板（内嵌在 report.md 尾部，供 Sonnet 参考）
    semantic_review_prompt: |
      请在 Cursor 对话中读取此 report.md，并回答：
      1. 哪个版本代码质量更高？理由（架构/可读性/安全性）？
      2. 是否存在架构违规（SecurityContext/RLS/AuditService/API 信封）？
      3. 是否有逻辑差异（而非风格差异）？差异影响？
      4. 建议：选 A（qwen）/ 选 B（sonnet）/ 手动合并？

  # ── apply 安全配置 ────────────────────────────────────────────────────────
  apply:
    require_report_exists: true     # apply 前必须先生成 report.md（防止盲目 apply）
    auto_mark_dag_done: true        # apply 成功后自动标记 DAG Unit 为 done
    scope_guard_warn_only: true     # 超出 unit.files 范围时仅警告（不阻断）


# ════════════════════════════════════════════════════════════════════════════
# 诊断追踪配置（EP-127 新增）
#
# 类比 Oracle 10046 Trace，为 MMS EP 工作流提供全链路诊断能力。
# 追踪数据存储在 docs/memory/private/trace/<EP-NNN>/ 目录下。
# 此目录已在 .gitignore 中排除，不会提交到 Git。
#
# 诊断级别（Level）：
#   Level 1  Basic    — 步骤耗时、成功/失败、Unit 状态变更（低开销）
#   Level 4  LLM      — +LLM 调用详情（模型/token/重试次数/结果）
#   Level 8  FileOps  — +文件变更详情（路径/行数/Scope Guard 结果）
#   Level 12 Full     — +LLM 完整 prompt/response 片段（前 N 字符）
#
# CLI 命令：
#   mms trace enable EP-NNN --level 4    # 开启追踪
#   mms trace disable EP-NNN             # 关闭追踪
#   mms trace show EP-NNN                # 查看 text 报告
#   mms trace show EP-NNN --format json  # 查看 JSON 报告
#   mms trace show EP-NNN --format html  # 生成 HTML 报告
#   mms trace summary EP-NNN            # 一行摘要
#   mms trace list                       # 列出所有有记录的 EP
#   mms trace clean EP-NNN              # 清除追踪数据
#   mms trace config EP-NNN --level 8   # 修改级别（不重置数据）
# ════════════════════════════════════════════════════════════════════════════
trace:
  # ── 全局开关 ──────────────────────────────────────────────────────────────
  enabled: false              # 全局追踪开关（false=默认不追踪，需用 mms trace enable 手动开启）
  # 注意：此处 enabled 是全局默认值，单个 EP 的追踪状态由
  #        docs/memory/private/trace/<EP-NNN>/trace_config.json 控制。

  # ── 默认诊断级别 ──────────────────────────────────────────────────────────
  default_level: 4            # 新开启追踪时的默认 Level（推荐 4，覆盖 LLM 调用详情）

  # ── 存储路径 ──────────────────────────────────────────────────────────────
  storage:
    base_dir: "docs/memory/private/trace"   # 相对于项目根
    # 每个 EP 的数据结构：
    #   trace/<EP-NNN>/
    #     trace.jsonl          — 原始事件流（JSONL，append-only）
    #     trace_config.json    — 追踪配置（level/enabled/trace_id/event_count）
    #     report/
    #       report.txt         — 文本报告（tkprof 风格）
    #       report.json        — 结构化报告
    #       report.html        — HTML 报告

  # ── 安全限制 ──────────────────────────────────────────────────────────────
  max_events_per_ep: 5000     # 每个 EP 最多记录多少事件（防止 trace.jsonl 无限增长）
  auto_stop_on_max: true      # 达到上限时自动停止写入（而非报错）

  # ── Level 12 内容截断 ─────────────────────────────────────────────────────
  preview_chars: 200          # Level 12：prompt/response 预览最多多少个字符

  # ── 报告配置 ──────────────────────────────────────────────────────────────
  report:
    auto_save: true           # show/summary 时是否自动保存报告到 report/ 目录
    waterfall_width: 30       # 耗时瀑布图宽度（字符数）
    use_color: true           # 终端报告是否使用 ANSI 颜色（CI 环境下建议 false）
