# task_quickmap.yaml — Task Type Quick Index (MMS Third-Level Retrieval Fallback)
#
# Purpose
# ───────
# When both level-1 (history similarity) and level-2 (memory keyword) retrieval
# find no matches, this file serves as a static fallback providing the minimum
# context for each task type. No LLM calls required; returns in milliseconds.
#
# Maintenance Rules
# ─────────────────
# - must_read_files: real file paths that are almost always needed for this task type
# - hot_memories:    most relevant memory IDs for this task type
# - key_constraints: 1-3 core constraint hints for the LLM
# - Update paths after refactoring by running: python3 codemap.py
#
# Version: v1.0 | Created: 2026-04-23 (fresh start)

version: "1.0"
created_at: "2026-04-23"

# ─────────────────────────────────────────────────────────────
# Task type → minimum context mapping
# ─────────────────────────────────────────────────────────────
task_types:

  ep-backend-api:
    description: "Add REST endpoint / service / repository"
    must_read_files: []   # Populate after running: python3 codemap.py
    hot_memories:
      - "MEM-DB-001"   # Transaction management: autobegin conflict
      - "MEM-API-001"  # Response envelope format
      - "AD-001"       # Hexagonal architecture: no direct infra imports in services
    key_constraints:
      - "Service public methods must accept ctx: SecurityContext as first argument"
      - "All WRITE operations must call AuditService.log()"
      - "Use transaction Strategy A (begin-first) or B (autobegin+commit), never both"

  ep-frontend:
    description: "Add frontend page / component"
    must_read_files: []
    hot_memories: []
    key_constraints:
      - "Management pages must be typed React components, not JSON configs"
      - "Use Zustand for state, React Query for data fetching"

  ep-data-pipeline:
    description: "Add connector / sync job / ingestion worker"
    must_read_files: []
    hot_memories:
      - "MEM-WRK-001"  # Worker execution scope
    key_constraints:
      - "Workers must use JobExecutionScope for lifecycle management"
      - "Stream data from S3/DB using generators (yield), never fetchall()"

  ep-debug:
    description: "Debug / investigate runtime error"
    must_read_files: []
    hot_memories:
      - "MEM-DB-001"
      - "MEM-RES-001"
    key_constraints:
      - "Check transaction strategy first (autobegin conflict is a common cause)"
      - "Check numeric defaults for or-operator bugs"

  ep-devops:
    description: "Docker / K8s / CI/CD changes"
    must_read_files: []
    hot_memories: []
    key_constraints:
      - "Use multi-stage Dockerfile for production images"
      - "K8s resource limits must be set for all containers"
