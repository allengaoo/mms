      - "AD-005"      # 事务策略 A/B

  L2_messaging:
    label: "消息队列基础设施层"
    description: "Kafka aiokafka Producer/Consumer、Avro Schema Registry、NullSafeNormalizer"
    path_prefixes:
      - "backend/app/infrastructure/kafka/"
      - "backend/app/infrastructure/messaging/"
    entry_files: []
    keywords:
      - "kafka"
      - "avro"
      - "schema registry"
      - "序列化"
      - "message"
      - "topic"
      - "producer"
      - "consumer"
      - "normalize"
    hot_memories:
      - "MEM-L-002"   # Avro 序列化静默失败根因
      - "MEM-L-010"   # Kafka K8s 单节点配置
      - "MEM-L-011"   # Kafka Avro 格式规范
      - "AD-007"      # NullSafeNormalizer 门控

  L2_cache:
    label: "缓存基础设施层"
    description: "Redis async、@cached 装饰器、RedisLeaderElection"
    path_prefixes:
      - "backend/app/infrastructure/cache/"
      - "backend/app/infrastructure/consensus/"
    entry_files:
      - "backend/app/infrastructure/cache/redis_decorator.py"
    keywords:
      - "redis"
      - "cache"
      - "缓存"
      - "leader election"
      - "leader"
      - "@cached"
