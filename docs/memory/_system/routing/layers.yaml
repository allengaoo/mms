  L2_storage:
    label: "对象存储基础设施层"
    description: "MinIO S3、Iceberg、流式 IO（yield，禁止 read()）"
    path_prefixes:
      - "backend/app/infrastructure/storage/"
    entry_files: []
    keywords:
      - "minio"
      - "s3"
      - "存储"
      - "iceberg"
      - "object storage"
      - "流式"
    hot_memories: []

  # ─────────────────────────────────────────────────────────
  # L1：平台安全层（RBAC / SecurityContext / AuditService）
  # ─────────────────────────────────────────────────────────

  L1_security:
    label: "平台安全层"
    description: "RBAC 权限注册表、SecurityContext、AuditService、JWT 认证"
    path_prefixes:
      - "backend/app/core/rbac.py"
      - "backend/app/core/security.py"
      - "backend/app/core/auth.py"
    entry_files:
      - "backend/app/core/rbac.py"
      - "backend/app/core/security.py"
      - "backend/app/core/auth.py"
    keywords:
      - "tenant_id"
      - "SecurityContext"
      - "RLS"
      - "多租户"
      - "audit"
      - "AuditService"
      - "RBAC"
      - "权限"
      - "认证"
      - "JWT"
      - "401"
      - "403"
      - "登录"
    hot_memories:
      - "AD-002"      # RLS 基线
      - "AD-003"      # 控制面/数据面分离

  # ─────────────────────────────────────────────────────────
  # CC：横切关注点（架构决策 + 文档）
  # ─────────────────────────────────────────────────────────

  CC_architecture:
    label: "横切架构层"
    description: "架构决策记录（ADR）、全链路追踪文档、前端页面地图"
    path_prefixes:
      - "docs/architecture/"
      - ".cursor/rules/"
    entry_files:
      - "docs/architecture/e2e_traceability.md"
      - "docs/architecture/frontend_page_map.md"
    keywords:
      - "architecture"
      - "decision"
