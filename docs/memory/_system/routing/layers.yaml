  # ─────────────────────────────────────────────────────────
  # L0_mms：MMS 工具层（EP-128 新增）
  # 覆盖 scripts/mms/ 下所有 AI 工程工具：合成器、追踪器、DAG 编排、
  # 知识蒸馏、autoDream 等。不属于任何业务层，是平台的"元工具层"。
  # ─────────────────────────────────────────────────────────

  L0_mms:
    label: "MMS 工具层"
    description: |
      MMS（Memory Management System）AI 工程记忆工具集。
      涵盖 EP 工作流编排（ep_wizard）、意图合成（synthesizer）、
      DAG 生成与执行（dag_model / unit_runner / unit_compare）、
      诊断追踪（trace/）、知识蒸馏（dream / distill）和系统配置（mms_config）。
    path_prefixes:
      - "cli.py"
      - "ep_wizard.py"
      - "synthesizer.py"
      - "unit_runner.py"
      - "unit_compare.py"
      - "trace/"
      - "dream.py"
      - "mms_config.py"
    entry_files:
      - "cli.py"             # MMS 统一 CLI 入口
      - "ep_wizard.py"       # EP 7 步工作流向导
      - "synthesizer.py"     # 意图合成（mms synthesize）
      - "unit_runner.py"     # DAG Unit 自动执行
      - "unit_compare.py"    # 双模型对比（Qwen vs Sonnet）
      - "trace/tracer.py"    # 诊断追踪主类
      - "trace/reporter.py"  # 诊断报告生成
      - "dream.py"           # autoDream 知识萃取
      - "mms_config.py"      # 配置统一加载
    keywords:
      - "mms"
      - "synthesize"
      - "意图合成"
      - "trace"
      - "诊断"
      - "诊断数据"
      - "追踪"
      - "步骤耗时"
      - "最慢"
      - "token"
      - "消耗"
      - "报告"
      - "dag"
      - "unit"
      - "ep"
      - "执行计划"
      - "distill"
      - "蒸馏"
      - "dream"
      - "草稿"
      - "记忆"
      - "知识"
      - "waterfall"
      - "瀑布图"
      - "retry"
      - "重试"
      - "llm 调用"
      - "compare"
      - "对比"
      - "qwen"
      - "sonnet"
    hot_memories:
      - "AD-008"    # 知识索引三层架构

  # ─────────────────────────────────────────────────────────
  # Ops：运维部署层
  # ─────────────────────────────────────────────────────────

  Ops:
    label: "运维部署层"
    description: "OrbStack K8s、Docker Compose、镜像构建、Alembic 数据库迁移"
    path_prefixes:
      - "deploy/"
      - "backend/alembic/"
    entry_files:
      - "deploy/docker-compose.app.yml"
    keywords:
      - "k8s"
      - "kubectl"
      - "docker"
      - "deploy"
      - "部署"
      - "镜像"
      - "image"
      - "运维"
      - "alembic"
      - "migration"
      - "数据库迁移"
      - "端口转发"
      - "OrbStack"
    hot_memories:
      - "ENV-001"     # K8s 生产模拟环境快照
      - "MEM-DB-002"  # 数据库迁移前的事务约束确认
