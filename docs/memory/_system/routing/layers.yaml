# MDP 项目架构层定义 — MMS-OG v3.0
#
# 用途：
#   将项目的代码结构显式化为"层（Layer）"对象，是意图分类和路径解析的核心依据。
#   取代 injector.py 中硬编码的 _KEYWORD_LAYER_MAP 和 synthesizer.py 中的路径示例字符串。
#
# 维护规则：
#   - 新增模块或重构目录后，在对应层的 path_prefixes 中更新路径
#   - entry_files 是该层"最常被读取"的入口文件，LLM 分类时会优先提示这些文件
#   - keywords 用于意图分类：用户描述中出现这些词，触发该层
#   - 修改后运行：python3 scripts/mms/cli.py validate --schema
#
# 版本：v3.0 | 创建于：2026-04-16 | EP-116

version: "3.0"
created_at: "2026-04-16"
source_ep: "EP-116"

layers:

  # ─────────────────────────────────────────────────────────
  # L5：界面层（前端 + API）
  # ─────────────────────────────────────────────────────────

  L5_frontend:
    label: "前端界面层"
    description: "React 18 页面、主布局、侧栏导航、Zustand Store、Axios 服务封装、通用组件"
    path_prefixes:
      - "frontend/src/layouts/"          # 主布局组件（MainLayout、SidebarLayout 等）
      - "frontend/src/config/"           # 配置文件（navigation.ts、routes 配置）
      - "frontend/src/pages/"            # 业务页面组件（按模块分目录）
      - "frontend/src/stores/"           # Zustand 状态管理 Store
      - "frontend/src/services/"         # Axios 封装的 API 调用函数
      - "frontend/src/components/"       # 通用 UI 组件
      - "frontend/src/utils/"            # 工具函数（request.ts、formatters 等）
      - "frontend/src/routes/"           # 路由定义与权限守卫
    entry_files:
      - "frontend/src/layouts/MainLayout.tsx"      # 主布局（顶栏 + 侧栏渲染核心）
      - "frontend/src/config/navigation.ts"        # 顶栏 Tab + 侧栏菜单配置（最常修改）
      - "frontend/src/routes/index.tsx"             # 路由总表
      - "frontend/src/utils/request.ts"             # Axios 拦截器（401/403 处理）
    keywords:
      # 中文关键词
      - "导航"
      - "菜单"
      - "侧栏"
      - "顶栏"
      - "页面"
      - "组件"
      - "前端"
      - "工作台"
      - "仪表盘"
      - "导航栏"
      - "精简"
      - "隐藏菜单"
      - "只保留"
      # 英文关键词
      - "navigation"
      - "sidebar"
      - "header"
      - "layout"
      - "navbar"
      - "menu"
      - "react"
      - "store"
      - "zustand"
      - "component"
      - "dashboard"
      - "page"
      - "route"
      - "ProTable"
      - "ProForm"
    hot_memories:
      - "MEM-L-023"   # React vs Amis 渲染技术选型
      - "MEM-L-025"   # RBAC PermissionGate 前端权限控制
      - "AD-004"      # Management 页面必须用 React 组件，禁用 Amis JSON

  L5_api:
    label: "API 接口层"
    description: "FastAPI Router、Request/Response Schema、API 版本控制"
    path_prefixes:
      - "backend/app/api/v1/endpoints/"    # FastAPI 路由处理器
      - "backend/app/api/schemas/"         # Pydantic v2 请求/响应模型
      - "backend/app/api/v1/"              # API 版本路由注册
    entry_files:
      - "backend/app/api/v1/endpoints/auth.py"      # 认证接口（登录/刷新）
      - "backend/app/api/v1/endpoints/ontology.py"  # 本体接口
      - "backend/app/core/response.py"               # API 信封格式定义
      - "backend/app/core/exceptions.py"             # 异常与错误码
    keywords:
      - "API"
      - "接口"
      - "路由"
      - "endpoint"
      - "REST"
      - "response"
      - "request"
      - "schema"
      - "信封"
      - "状态码"
      - "参数校验"
    hot_memories:
      - "MEM-L-020"   # API 必须用 Envelope {code, data, meta}
      - "MEM-L-022"   # DomainException 错误码规范
      - "AD-002"      # RLS：所有 API 必须含 tenant_id 过滤

  L5_testing:
    label: "测试层"
    description: "Pytest 单元测试、集成测试、Vitest 前端测试、MSW Mock Service Worker"
    path_prefixes:
      - "backend/tests/unit/"
      - "backend/tests/integration/"
      - "frontend/src/**/__tests__/"
      - "frontend/src/test/"
    entry_files:
      - "backend/tests/unit/services/test_auth_service.py"
      - "backend/tests/unit/api/test_health_endpoint.py"
    keywords:
      - "test"
      - "测试"
      - "单元测试"
      - "集成测试"
      - "pytest"
      - "vitest"
      - "mock"
      - "MSW"
      - "polyfactory"
      - "dirty-equals"
      - "renderWithProviders"
    hot_memories: []

  # ─────────────────────────────────────────────────────────
  # L4：应用服务层（Service + Worker）
  # ─────────────────────────────────────────────────────────

  L4_service:
    label: "应用服务层"
    description: "Control Plane Service（MySQL 读写）、Query Service（ES/Milvus 查询）"
    path_prefixes:
      - "backend/app/services/control/"    # 控制面 Service（写操作→MySQL）
      - "backend/app/services/query/"      # 查询面 Service（读→ES/Milvus）
      - "backend/app/services/dispatch/"   # 事件分发（Control→Data Plane）
    entry_files:
      - "backend/app/services/control/auth_service.py"
      - "backend/app/services/control/ontology_service.py"
      - "backend/app/services/control/datalink_service.py"
    keywords:
      - "service"
      - "业务逻辑"
      - "服务层"
      - "create"
      - "update"
      - "delete"
      - "查询"
      - "control"
      - "CQRS"
      - "command"
    hot_memories:
      - "AD-002"      # RLS：Service 必须 WHERE tenant_id
      - "AD-003"      # 控制面禁止直写向量库
      - "AD-005"      # 事务策略 A/B 二选一

  L4_worker:
    label: "Worker 层"
    description: "APScheduler、IngestionWorker、IndexingWorker、JobExecutionScope 生命周期管理"
    path_prefixes:
      - "backend/app/workers/"
    entry_files:
      - "backend/app/workers/base.py"        # JobExecutionScope（必须使用）
      - "backend/app/workers/scheduler_engine.py"
    keywords:
      - "worker"
      - "调度"
      - "scheduler"
      - "任务"
      - "JobExecutionScope"
      - "ingestion"
      - "cron"
      - "后台任务"
    hot_memories:
      - "AD-006"      # JobExecutionScope 作为 Worker 唯一生命周期管理机制
      - "MEM-L-016"   # 数据管道 Worker 使用约束

  # ─────────────────────────────────────────────────────────
  # L3：领域层（本体 + 数据管道 + 治理）
  # ─────────────────────────────────────────────────────────

  L3_ontology:
    label: "本体领域层"
    description: "ObjectTypeDef、LinkTypeDef、ActionDef、FunctionDef、OntologyScenario"
    path_prefixes:
      - "backend/app/models/ontology.py"
      - "backend/app/services/control/ontology_service.py"
      - "backend/app/api/v1/endpoints/ontology.py"
    entry_files:
      - "backend/app/models/ontology.py"
      - "backend/app/services/control/ontology_service.py"
      - "backend/app/api/v1/endpoints/ontology.py"
    keywords:
      - "本体"
      - "对象类型"
      - "链接类型"
      - "ontology"
      - "ObjectTypeDef"
      - "LinkTypeDef"
      - "ActionDef"
      - "FunctionDef"
      - "场景"
      - "回写"
      - "overlay"
      - "SharedProperty"
      - "影响分析"
    hot_memories:
      - "MEM-L-012"   # ObjectTypeDef 主键与索引
      - "MEM-L-013"   # Action 回写机制（scenario vs live）
      - "BIZ-001"     # 对象类型 CRUD 业务流程

  L3_data_pipeline:
    label: "数据管道领域层"
    description: "Connector、SyncJob、IngestionWorker、DataCatalog、列映射"
    path_prefixes:
      - "backend/app/services/control/datalink_service.py"
      - "backend/app/infrastructure/connector/"
      - "backend/app/workers/"
    entry_files:
      - "backend/app/services/control/datalink_service.py"
      - "backend/app/api/v1/endpoints/datalink.py"
      - "backend/app/workers/base.py"
    keywords:
      - "connector"
      - "syncjob"
      - "同步任务"
      - "数据管道"
      - "pipeline"
      - "ingestion"
      - "DataCatalog"
      - "列映射"
      - "watermark"
      - "CDC"
      - "增量"
      - "全量"
    hot_memories:
      - "MEM-L-016"   # Worker 使用 JobExecutionScope
      - "AD-007"      # NullSafeNormalizer 作为 Kafka 发送前强制门
      - "BIZ-002"     # 数据同步管道业务流程

  L3_governance:
    label: "治理领域层"
    description: "TenantQuota 配额管理、ChangeRequest 变更审批、ACL 权限"
    path_prefixes:
      - "backend/app/services/control/"
      - "docs/specs/governance/"
    entry_files: []
    keywords:
      - "governance"
      - "治理"
      - "quota"
      - "配额"
      - "change request"
      - "CR"
      - "审批"
      - "ACL"
    hot_memories:
      - "MEM-L-018"   # Quota Redis 原子操作

  # ─────────────────────────────────────────────────────────
  # L2：基础设施层（DB / Kafka / Redis / Storage）
  # ─────────────────────────────────────────────────────────

  L2_database:
    label: "数据库基础设施层"
    description: "MySQL 8.0 AsyncSession、SQLModel ORM、Alembic 迁移"
    path_prefixes:
      - "backend/app/infrastructure/db/"
      - "backend/alembic/"
      - "backend/app/core/db.py"
    entry_files:
      - "backend/app/core/db.py"
      - "backend/alembic/env.py"
