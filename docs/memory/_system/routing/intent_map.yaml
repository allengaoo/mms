# 意图快速映射表 — MMS-OG v3.0
#
# 用途：
#   用户任务描述 → {layer, operation} 的纯本地快速匹配。
#   取代 injector.py 中硬编码的 _KEYWORD_LAYER_MAP。
#
# 匹配算法（arch_resolver.py 实现）：
#   1. 按 priority 从高到低逐条检查规则
#   2. 统计 keywords 中有多少在任务描述中出现
#   3. 命中数 / 规则 keywords 总数 ≥ min_hit_ratio 时触发该规则
#   4. confidence = min(命中比例 × 2, 1.0) + confidence_boost（若配置）
#   5. confidence ≥ 0.80 时跳过第1轮 LLM 调用，直接进入路径解析
#
# 版本：v3.0 | 创建于：2026-04-16 | EP-116

version: "3.0"
created_at: "2026-04-16"

defaults:
  min_hit_ratio: 0.12
  confidence_threshold: 0.80

