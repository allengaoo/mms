# LinkTypeDef: link_impacts — 记忆节点影响关系
# ──────────────────────────────────────────────
# 当一条记忆的内容发生变化时，需要同步检查的相关记忆。
# 用于新鲜度传播（freshness propagation）：文件变更 → 标记记忆 → 沿 impacts 传播。

id: link_impacts
label: "影响关系"
version: "1.0"

source_type: MemoryNode
target_type: MemoryNode
cardinality: M:N
inverse: impacted_by

storage:
  field_name: impacts       # 存储在 MemoryNode 的 front-matter 字段
  field_type: list[string]  # 存储目标 MemoryNode 的 id

auto_population:
  trigger: action_distill
  method: tag_overlap_detection
  enabled_by_config: runner_enable_auto_impacts  # 默认 false，避免无谓计算
  description: |
    可选的 Step 3 建边：检测 tags 字段重叠度较高的记忆，
    认为它们之间可能存在影响关系，自动建立 impacts 边。
    仅在 config.yaml 的 runner_enable_auto_impacts: true 时执行。

traversal_usage:
  - path_id: code_change_impact
    description: "代码变更时，沿 impacts 边传播新鲜度检测，找到级联受影响的记忆"

freshness_propagation:
  depth: 1    # 只传播一跳，避免级联爆炸
  description: "标记 drift_suspected 记忆后，其 impacts 列表中的记忆也被标记（一跳传播）"
