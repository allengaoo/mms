# 查询同义词扩展词典 — BM25 兜底层第一层缓存
# ══════════════════════════════════════════════════════════════════════════════
#
# 用途：
#   当 ontology 系统置信度 < FALLBACK_THRESHOLD 时，触发 BM25 对记忆文档检索。
#   BM25 是词汇精确匹配，对抽象概念查询（"为什么这样设计"）命中率低。
#   本词典将抽象查询词扩展为文档中实际出现的术语，弥合词汇鸿沟。
#
# 格式：
#   每个条目为 "用户自然语言词汇" → [文档中对应的技术术语列表]
#   BM25 查询时用原始词 + 所有同义词构建查询 token 集合。
#
# 设计原则：
#   1. 用户侧词汇（模糊、口语化）→ 文档侧词汇（精确、技术性）
#   2. 每组同义词不超过 8 个，避免稀释 BM25 信号
#   3. 优先覆盖 F 类（纯文档概念查询）和 G 类（通用 SE）的盲区
#
# 版本：1.0 | 创建于：2026-04-21 | EP-129（续）

