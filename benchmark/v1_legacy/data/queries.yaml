        - "backend/app/services/control/datalink_service.py"
        - "backend/app/core/rbac.py"
      key_memory_ids:
        - "AD-002"
        - "AD-003"
      has_executable_cmd: false

  - query_id: "B-005"
    category: "B"
    category_desc: "跨层任务 — 前端 + API"
    task: "对象血缘的可视化页面要用力导向图展示，点击节点能跳转到对应的 Object360 详情页"
    source: "ep_title"
    ground_truth:
      layer: "L5_frontend"
      operation: "create"
      key_files:
        - "frontend/src/pages/explorer/Object360/index.tsx"
        - "backend/app/api/v1/endpoints/ontology.py"
      key_memory_ids: []
      has_executable_cmd: false

  - query_id: "B-006"
    category: "B"
    category_desc: "跨层任务 — 全链路功能"
