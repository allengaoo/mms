# Benchmark 测试数据集 v1.0
# ══════════════════════════════════════════════════════════════════════════════
#
# 设计原则：
#   1. task 措辞模拟真实用户语言，避免直接使用 intent_map 中的关键词
#   2. 来源三分法：ep_title（EP标题改写）/ task_history（历史任务）/ constructed（人工构造）
#   3. Ground Truth 独立于任何检索系统，基于"完成任务工程师必须打开哪些文件"的客观判断
#   4. key_files 均经过磁盘存在性验证
#   5. adversarial 类别单独分析，不计入主评估综合得分
#
# 类别说明：
#   A — 原子任务（单层、单文件）：三系统差距最小，作为公平基线
#   B — 跨层任务（2+ 架构层）：典型工程软件开发场景
#   C — 约束感知（需定位特定约束记忆）：RAG 语义相关 ≠ 约束精准
#   D — MMS 工具操作：本体专属规则场景
#   adversarial — 关键词歧义/意图混淆，单独报告
#
# 修改说明：
#   - 新增任务：在对应 category 下添加新条目，保持 query_id 连续
#   - 修改 GT：只改 ground_truth 节，task 保持不变（避免引入新的偏差）
#   - 新增类别：在 metadata.categories 中添加描述
#
# 版本：1.0 | 创建于：2026-04-18 | EP-129

metadata:
  version: "1.0"
  total: 30
  main_eval: 25         # 主评估任务数（不含 adversarial）
  adversarial: 5
  top_k: 5              # 评估 Recall@K 时的 K 值
  categories:
    A: "原子任务 — 单层、单文件修改，三系统差距最小，作为公平基线"
    B: "跨层任务 — 同时涉及 2+ 架构层，典型复杂工程场景"
    C: "约束感知 — 需定位特定约束记忆，测试精准注入能力"
    D: "MMS工具 — 本体有专属规则，测试系统对自身工具的理解"
    adversarial: "对抗样本 — 关键词歧义/意图混淆，单独分析"

queries:

  # ══════════════════════════════════════════════════════════════════════════
  # 类别 A：原子任务（8条）
  # 来源：EP 标题改写 + 真实措辞
  # 特点：单层、单模块，GT 文件 1-2 个
  # ══════════════════════════════════════════════════════════════════════════

  - query_id: "A-001"
    category: "A"
    category_desc: "原子任务 — 后端 API 新增"
    task: "我需要给对象类型增加一个列表查询接口，支持按名称和状态过滤，结果要分页"
    source: "ep_title"
    ground_truth:
      layer: "L5_api"
      operation: "create"
      key_files:
        - "backend/app/api/v1/endpoints/ontology.py"
        - "backend/app/services/control/ontology_service.py"
      key_memory_ids:
        - "AD-002"
      has_executable_cmd: false

  - query_id: "A-002"
    category: "A"
    category_desc: "原子任务 — 后端 Service 新增方法"
    task: "在数据连接器服务里加一个方法，测试连接是否可达，超时时间要可配置"
    source: "ep_title"
    ground_truth:
      layer: "L4_service"
      operation: "create"
      key_files:
        - "backend/app/services/control/datalink_service.py"
      key_memory_ids:
        - "AD-002"
        - "AD-005"
      has_executable_cmd: false

  - query_id: "A-003"
    category: "A"
    category_desc: "原子任务 — 前端页面新增"
    task: "把首页的顶部导航栏只保留本体管理这一个入口，其他的菜单项全部隐藏"
    source: "task_history"
    ground_truth:
      layer: "L5_frontend"
      operation: "modify_config"
      key_files:
        - "frontend/src/config/navigation.ts"
        - "frontend/src/layouts/MainLayout.tsx"
      key_memory_ids: []
      has_executable_cmd: false

  - query_id: "A-004"
