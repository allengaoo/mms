    source: "ep_title"
    ground_truth:
      layer: "L5_testing"
      operation: "test"
      key_files:
        - "backend/app/services/control/datalink_service.py"
        - "backend/app/services/control/ontology_service.py"
        - "backend/app/api/v1/endpoints/ontology.py"
      key_memory_ids:
        - "AD-002"
      has_executable_cmd: false

  - query_id: "B-007"
    category: "B"
    category_desc: "跨层任务 — K8s 部署 + 后端服务"
    task: "CDC 变更数据捕获的组件要部署到集群里，同时服务层要能接收 Debezium 发过来的事件并处理"
    source: "ep_title"
    ground_truth:
      layer: "Ops"
      operation: "deploy"
      key_files:
        - "deploy/docker-compose.app.yml"
        - "backend/app/workers/ingestion.py"
      key_memory_ids:
        - "ENV-001"
      has_executable_cmd: false

  # ══════════════════════════════════════════════════════════════════════════
  # 类别 C：约束感知任务（5条）
  # 来源：历史任务改写（症状描述，不提模块名）
  # 特点：需精确命中特定约束记忆，仅找到"相关文档"不够
  # ══════════════════════════════════════════════════════════════════════════

  - query_id: "C-001"
    category: "C"
    category_desc: "约束感知 — 事务 Bug"
    task: "保存对象类型的时候报了个 InvalidRequestError，说有事务已经在进行中，但我没有手动开事务"
    source: "task_history"
    ground_truth:
      layer: "L4_service"
      operation: "debug"
      key_files:
        - "backend/app/services/control/ontology_service.py"
      key_memory_ids:
        - "MEM-DB-002"
      has_executable_cmd: false

  - query_id: "C-002"
    category: "C"
    category_desc: "约束感知 — Kafka 序列化失败"
    task: "Kafka 消费端有时候反序列化会静默失败，数据丢了但没有任何报错，怎么定位和修复"
    source: "task_history"
    ground_truth:
      layer: "L2_messaging"
      operation: "debug"
      key_files:
        - "backend/app/workers/ingestion.py"
      key_memory_ids:
        - "MEM-L-002"
        - "MEM-L-011"
      has_executable_cmd: false

  - query_id: "C-003"
    category: "C"
    category_desc: "约束感知 — 多租户数据隔离"
    task: "发现 A 租户的用户能看到 B 租户的对象数据，需要排查是哪里的查询没有做租户过滤"
    source: "constructed"
    ground_truth:
      layer: "L4_service"
      operation: "debug"
      key_files:
        - "backend/app/services/control/ontology_service.py"
        - "backend/app/core/rbac.py"
      key_memory_ids:
        - "AD-002"
      has_executable_cmd: false

  - query_id: "C-004"
    category: "C"
    category_desc: "约束感知 — Python 数值默认值陷阱"
    task: "批量导入时如果某一行的数量字段是 0，后端会把它当成空值来处理，用了字段的默认配置，逻辑有问题"
    source: "constructed"
    ground_truth:
      layer: "L4_service"
      operation: "debug"
      key_files:
        - "backend/app/workers/ingestion.py"
      key_memory_ids:
        - "MEM-L-001"
      has_executable_cmd: false

  - query_id: "C-005"
    category: "C"
    category_desc: "约束感知 — 容器日志不可见"
    task: "K8s 里的后端容器明明在运行，kubectl logs 却看不到任何输出，像是没有产生日志一样"
    source: "task_history"
    ground_truth:
      layer: "Ops"
      operation: "debug"
      key_files:
        - "deploy/docker-compose.app.yml"
      key_memory_ids:
        - "MEM-L-009"
      has_executable_cmd: false

  # ══════════════════════════════════════════════════════════════════════════
  # 类别 D：MMS 工具操作（5条）
  # 来源：历史任务真实措辞改写（避免直接使用系统关键词）
  # 特点：本体有专属规则（L0_mms），测试系统对自身工具的理解
  # ══════════════════════════════════════════════════════════════════════════

  - query_id: "D-001"
    category: "D"
    category_desc: "MMS工具 — 诊断追踪查看"
    task: "上一个章节执行完了，想看看各个步骤花了多少时间，哪个环节是瓶颈，以及模型调用了几次"
    source: "task_history"
    ground_truth:
      layer: "L0_mms"
      operation: "view_trace"
      key_files:
        - "scripts/mms/trace/reporter.py"
        - "scripts/mms/cli.py"
      key_memory_ids: []
      has_executable_cmd: true

  - query_id: "D-002"
    category: "D"
    category_desc: "MMS工具 — 意图合成"
