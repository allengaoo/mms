    source: "task_history"
    ground_truth:
      layer: "L0_mms"
      operation: "mms_dag"
      key_files:
        - "scripts/mms/unit_generate.py"
        - "scripts/mms/unit_runner.py"
        - "scripts/mms/cli.py"
      key_memory_ids: []
      has_executable_cmd: true

  - query_id: "D-004"
    category: "D"
    category_desc: "MMS工具 — 知识蒸馏"
    task: "这个章节做完了，把里面踩过的坑和关键决策提炼出来，沉淀成可以复用的工程经验"
    source: "task_history"
    ground_truth:
      layer: "L0_mms"
      operation: "mms_distill"
      key_files:
        - "scripts/mms/dream.py"
        - "scripts/mms/cli.py"
      key_memory_ids: []
      has_executable_cmd: true

  - query_id: "D-005"
    category: "D"
    category_desc: "MMS工具 — 测试基础设施评估"
    task: "帮我看看当前 MMS 系统的测试覆盖情况，有哪些重要的场景还没有被测试用例覆盖到"
    source: "task_history"
    ground_truth:
      layer: "L0_mms"
      operation: "review"
      key_files:
        - "scripts/mms/tests/"
        - "scripts/mms/cli.py"
      key_memory_ids: []
      has_executable_cmd: false

  # ══════════════════════════════════════════════════════════════════════════
  # 对抗样本（5条）— 单独分析，不计入主评估综合得分
  # 构造原则：
  #   ADV-1/2：关键词歧义（词语在多个领域有不同含义）
  #   ADV-3/4：意图混淆（任务描述故意跨越两个不相关的领域）
  #   ADV-5：本体盲区（使用 intent_map 中完全没有的新兴词汇描述常见任务）
  # ══════════════════════════════════════════════════════════════════════════

  - query_id: "ADV-001"
    category: "adversarial"
    category_desc: "对抗 — 关键词歧义：trace 的多重含义"
    task: "数据血缘 trace 功能在追踪对象的来源时，有几个节点的上下游关系没有被正确记录"
    source: "constructed"
    ground_truth:
      layer: "L3_ontology"
      operation: "debug"
      key_files:
        - "backend/app/services/control/ontology_service.py"
      key_memory_ids: []
      has_executable_cmd: false
    adversarial_intent: "trace 在此处是数据血缘概念，不是 MMS 诊断追踪，测试系统是否会误匹配 rule_mms_trace"

  - query_id: "ADV-002"
    category: "adversarial"
    category_desc: "对抗 — 关键词歧义：dag 的多重含义"
    task: "Spark 任务的有向无环图执行顺序有问题，Stage3 应该在 Stage1 完成后才开始，但现在是并行的"
    source: "constructed"
    ground_truth:
      layer: "L4_worker"
      operation: "debug"
      key_files:
        - "backend/app/workers/ingestion.py"
      key_memory_ids: []
      has_executable_cmd: false
    adversarial_intent: "dag 在此处是 Spark 执行图，不是 MMS DAG 编排，测试是否会误匹配 rule_mms_dag"

  - query_id: "ADV-003"
    category: "adversarial"
    category_desc: "对抗 — 意图混淆：同时包含前端和后端关键特征"
    task: "前端的 Zustand Store 在调用后端创建对象接口时，响应的数据没有触发状态更新，页面不刷新"
    source: "constructed"
    ground_truth:
      layer: "L5_frontend"
      operation: "debug"
      key_files:
        - "frontend/src/pages/explorer/Object360/index.tsx"
        - "backend/app/api/v1/endpoints/ontology.py"
      key_memory_ids: []
      has_executable_cmd: false
    adversarial_intent: "同时出现前端(Zustand)和后端(接口)关键词，测试系统能否识别主要故障域在前端"

  - query_id: "ADV-004"
    category: "adversarial"
    category_desc: "对抗 — 意图混淆：看起来像测试，实际是 debug"
    task: "集成测试里有 16 个用例失败了，但失败原因不是测试写错了，是被测的 Service 逻辑有问题"
    source: "ep_title"
    ground_truth:
      layer: "L4_service"
      operation: "debug"
      key_files:
        - "backend/app/services/control/ontology_service.py"
      key_memory_ids: []
      has_executable_cmd: false
    adversarial_intent: "包含'测试''失败'等词，但真正的操作是 debug service，不是 add test"

  - query_id: "ADV-005"
    category: "adversarial"
    category_desc: "对抗 — 本体盲区：用新兴术语描述常见任务"
    task: "用 vibe coding 的方式快速搭一个原型接口，先不用考虑测试覆盖和架构规范"
    source: "constructed"
    ground_truth:
      layer: "L5_api"
      operation: "create"
      key_files:
        - "backend/app/api/v1/endpoints/ontology.py"
      key_memory_ids: []
      has_executable_cmd: false
    adversarial_intent: "'vibe coding' 不在任何系统的关键词中，测试系统的泛化兜底能力"
