      key_files:
        - "backend/app/core/rbac.py"
      key_memory_ids: []
      has_executable_cmd: false

  - query_id: "A-007"
    category: "A"
    category_desc: "原子任务 — 后端单测补充"
    task: "补充对 action_service 里创建动作方法的单元测试，要覆盖成功和字段校验失败的场景"
    source: "task_history"
    ground_truth:
      layer: "L5_testing"
      operation: "test"
      key_files:
        - "backend/app/services/control/action_service.py"
      key_memory_ids: []
      has_executable_cmd: false

  - query_id: "A-008"
    category: "A"
    category_desc: "原子任务 — 运维配置"
    task: "本地调试时后端服务启动报数据库连不上，我用的是宿主机上 3307 端口的那个 MySQL"
    source: "task_history"
    ground_truth:
      layer: "Ops"
      operation: "debug"
      key_files:
        - "deploy/docker-compose.app.yml"
      key_memory_ids:
        - "ENV-001"
      has_executable_cmd: false

  # ══════════════════════════════════════════════════════════════════════════
  # 类别 B：跨层任务（7条）
  # 来源：EP 标题改写
  # 特点：同时涉及 2+ 架构层，GT 文件 2-4 个
  # ══════════════════════════════════════════════════════════════════════════

  - query_id: "B-001"
    category: "B"
    category_desc: "跨层任务 — API + Service + 前端"
    task: "我要做一个完整的同步任务管理功能，包括创建、暂停、恢复，后端接口和前端页面都要"
    source: "ep_title"
    ground_truth:
      layer: "L5_api"
      operation: "create"
      key_files:
        - "backend/app/api/v1/endpoints/ontology.py"
        - "backend/app/services/control/datalink_service.py"
        - "frontend/src/config/navigation.ts"
      key_memory_ids:
        - "AD-002"
        - "AD-005"
      has_executable_cmd: false

  - query_id: "B-002"
    category: "B"
    category_desc: "跨层任务 — Service + DB"
    task: "场景模拟功能里，读取对象数据的时候要优先用场景覆盖层的数据，不能直接读主库"
    source: "ep_title"
    ground_truth:
      layer: "L4_service"
      operation: "modify_logic"
      key_files:
        - "backend/app/services/control/ontology_service.py"
        - "backend/app/models/ontology.py"
      key_memory_ids:
