##############################################################################
# Layer 3 · SanitizationGate 测试集：JWT / IP / 密码 / 邮箱类凭证
##############################################################################

schema_version: "1.0"
gate: "SanitizationGate"

cases:

  # ── JWT Token ──────────────────────────────────────────────────────────────

  - id: san_sec_001
    category: jwt
    description: "标准三段式 JWT Token"
    input: "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
    should_detect: true
    severity: critical

  - id: san_sec_002
    category: jwt
    description: "JWT Token 嵌入在 curl 命令中"
    input: |
      curl -H "Authorization: Bearer eyJhbGciOiJSUzI1NiJ9.eyJ1c2VyX2lkIjoiMTIzIn0.signature_here" \
           https://api.example.com/v1/users
    should_detect: true
    severity: critical

  # ── 内网 IP 地址 ────────────────────────────────────────────────────────────

  - id: san_sec_003
    category: internal_ip
    description: "内网 IP（10.x.x.x）"
    input: "数据库地址：10.128.45.23:5432"
    should_detect: true
    severity: high

  - id: san_sec_004
    category: internal_ip
    description: "内网 IP（192.168.x.x）"
    input: "Redis 服务器: redis://192.168.1.100:6379/0"
    should_detect: true
    severity: high

  - id: san_sec_005
    category: internal_ip
    description: "内网 IP（172.16-31.x.x）"
    input: "Kafka broker: 172.16.100.50:9092"
    should_detect: true
    severity: high

  - id: san_sec_006
    category: internal_ip
    description: "公网 IP 不应被检测（示例用途）"
    input: "example server: 8.8.8.8"
    should_detect: false
    severity: medium

  - id: san_sec_007
    category: internal_ip
    description: "localhost 不应被检测"
    input: "DATABASE_URL=postgresql://localhost:5432/mydb"
    should_detect: false
    severity: medium

  # ── 硬编码密码 ──────────────────────────────────────────────────────────────

  - id: san_sec_008
    category: password
    description: "明文密码在连接字符串中"
    input: "DATABASE_URL=postgresql://admin:SuperSecret123!@db.internal:5432/prod"
    should_detect: true
    severity: critical

  - id: san_sec_009
    category: password
    description: "PASSWORD= 环境变量"
    input: "DB_PASSWORD=MyV3ryStr0ngP@ssw0rd"
    should_detect: true
    severity: critical

  - id: san_sec_010
    category: password
    description: "密码占位符不应触发"
    input: "DB_PASSWORD=your-password-here"
    should_detect: false
    severity: medium

  # ── 企业内部邮箱 ────────────────────────────────────────────────────────────

  - id: san_sec_011
    category: email
    description: "真实员工邮箱出现在记忆文档中"
    input: "联系 zhangsan@company-internal.cn 处理权限问题"
    should_detect: true
    severity: high

  - id: san_sec_012
    category: email
    description: "通用示例邮箱不应触发"
    input: "示例：user@example.com 或 admin@yourdomain.com"
    should_detect: false
    severity: medium

  # ── 数据库连接字符串（含密码）───────────────────────────────────────────────

  - id: san_sec_013
    category: connection_string
    description: "含密码的 PostgreSQL DSN"
    input: "SQLALCHEMY_URL = 'postgresql+asyncpg://prod_user:Pr0d_P@ss!@10.128.1.5:5432/prod_db'"
    should_detect: true
    severity: critical

  - id: san_sec_014
    category: connection_string
    description: "不含密码的连接字符串不应触发"
    input: "DATABASE_URL=postgresql://localhost/testdb"
    should_detect: false
    severity: medium
