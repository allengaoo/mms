# base/arch_schema/layers.yaml
# 通用 MMS 分层定义（适用于所有项目）
layers:
  - id: L1_model
    name: Domain Model
    keywords: [entity, model, schema, dto, vo, domain]
    description: 业务实体和值对象层
    
  - id: L2_repo
    name: Repository
    keywords: [repository, dao, mapper, store, persistence]
    description: 数据访问层（CRUD 抽象）
    
  - id: L3_service
    name: Service / Use Case
    keywords: [service, usecase, handler, application, interactor]
    description: 业务逻辑层
    
  - id: L4_api
    name: API / Controller
    keywords: [api, router, endpoint, controller, view, resource]
    description: 接口层（HTTP/gRPC/消息队列）
    
  - id: L5_infra
    name: Infrastructure
    keywords: [infrastructure, adapter, gateway, client, kafka, redis, celery]
    description: 基础设施层（第三方集成）
