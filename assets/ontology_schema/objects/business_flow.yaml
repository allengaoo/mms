# ObjectTypeDef: BusinessFlow — 跨层业务流程记忆
# ─────────────────────────────────────────────────────────────────
# 替代 MemoryNode(type=business-flow)，成为独立的 ObjectType。
# 继承 _memory_base.yaml 中的基础属性。
#
# 版本：v5.0 | 创建于：2026-05-05 | 从 MemoryNode God Object 拆分
# 前缀：BIZ-
# 层级：固定为 BIZ（跨层业务流，不属于任何单一技术层）

id: BusinessFlow
label: "跨层业务流程"
type: object
version: "5.0"
extends: "_memory_base"

declared_principles:
  - P1_density_over_completeness
  - P2_typed_relations_over_text
  - P4_focused_object_types
principle_notes: |
  从 MemoryNode God Object 拆分，专注描述端到端业务流程。
  BusinessFlow 的核心特征是"跨多个技术层"，所以 layer 固定为 BIZ。
  使用 involves_layers 字段明确列出涉及的层（typed 而非文本描述）。
  使用 steps_summary 提供流程步骤（结构化而非纯文本）。

description: |
  描述一个端到端的业务流程（Use Case 或 User Journey）。
  BusinessFlow 跨越多个技术层（ADAPTER→APP→DOMAIN→PLATFORM），
  是 LLM 理解业务意图的高价值上下文。
  例："用户注册流程"、"订单履约流程"、"账单生成流程"。

primary_key: "id"

backing_storage:
  type: markdown_frontmatter
  path_pattern: "docs/memory/shared/BIZ/BIZ-*.md"
  populated_by: ["action_distill", "manual"]

constraints:
  layer: "BIZ"  # BusinessFlow 的 layer 字段固定为 BIZ

# ── BusinessFlow 特有的核心属性 ──────────────────────────────────────────────
specific_properties:

  trigger:
    type: string
    required: false
    description: |
      触发该业务流的事件/操作。
      例："用户点击'注册'按钮", "定时任务每日00:00触发"
    ui_hint: "什么事件/操作触发了这个流程？"

  actor:
    type: string
    required: false
    description: |
      发起该流程的角色。
      例："用户"、"管理员"、"系统定时任务"、"外部系统"
    ui_hint: "谁发起了这个流程？"

  involves_layers:
    type: list[string]
    required: false
    default: []
    description: |
      该业务流涉及的技术层列表（使用 v5.0 通用层 ID）。
      例: [ADAPTER, APP, DOMAIN, PLATFORM]
    enum_source: "assets/ontology_schema/_config/universal_layers.yaml"
    ui_hint: "该流程经过哪些技术层？"

  steps_summary:
    type: list[string]
    required: false
    default: []
    description: |
      流程步骤摘要（有序列表，每步 1 句话）。
      例: [
        "1. ADAPTER: Controller 接收 POST /register 请求",
        "2. APP: UserService 校验邮箱唯一性",
        "3. DOMAIN: User Aggregate 创建新用户实体",
        "4. PLATFORM: UserRepository 持久化至 DB"
      ]
    ui_hint: "流程的主要步骤是什么？"

  happy_path_result:
    type: string
    required: false
    description: |
      正常路径的预期结果。
      例："用户注册成功，返回 201 Created，发送确认邮件"
    ui_hint: "成功完成后的预期结果是什么？"

  edge_cases:
    type: list[string]
    required: false
    default: []
    description: |
      需要特别处理的边缘情况列表。
      例: ["邮箱已存在 → 返回 409 Conflict", "网络超时 → 重试3次后报错"]
    ui_hint: "有哪些需要特别处理的边缘情况？"

  related_eps:
    type: list[string]
    required: false
    default: []
    description: "实现该业务流的 EP（Execution Plan）编号列表"

validation_rules:
  - rule_id: biz_layer_enforced
    check: "layer == 'BIZ'"
    severity: error
    message: "BusinessFlow 的 layer 必须为 'BIZ'"

  - rule_id: has_steps_or_trigger
    check: "len(steps_summary) > 0 OR trigger is not None"
    severity: warning
    message: "BusinessFlow 至少应有 trigger 或 steps_summary，否则信息密度不足"
