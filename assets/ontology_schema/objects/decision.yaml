# ObjectTypeDef: Decision — 架构设计决策记录（ADR）
# ─────────────────────────────────────────────────────────────────
# 替代 MemoryNode(type=decision)，成为独立的 ObjectType。
# 继承 _memory_base.yaml 中的基础属性。
#
# 版本：v5.0 | 创建于：2026-05-05 | 从 MemoryNode God Object 拆分
# 前缀：AD-（Architecture Decision）
# 参考：Michael Nygard ADR 格式（status/context/decision/consequences）

id: Decision
label: "架构设计决策"
type: object
version: "5.0"
extends: "_memory_base"

declared_principles:
  - P1_density_over_completeness
  - P4_focused_object_types
principle_notes: |
  从 MemoryNode God Object 拆分，专注表达已做出的架构选择。
  Decision 强调"为什么选 A 不选 B"，而 Pattern 描述"如何做某件事"。
  context/decision/consequences 是 ADR 的核心三要素，高密度语义字段。

description: |
  记录一个明确的架构或技术选型决策（Architecture Decision Record, ADR）。
  帮助 LLM 理解"为什么这样选择"，避免在未来的代码生成中做出与现有决策矛盾的选择。
  遵循 Michael Nygard ADR 格式。

primary_key: "id"

backing_storage:
  type: markdown_frontmatter
  path_pattern: "docs/memory/shared/{layer}/AD-*.md"
  populated_by: ["action_distill", "manual"]

# ── Decision 特有的核心属性 ──────────────────────────────────────────────────
specific_properties:

  status:
    type: string
    required: true
    enum: [proposed, accepted, deprecated, superseded]
    description: "决策状态"
    default: accepted
    ui_hint: "该决策当前是否仍然有效？"

  context:
    type: string
    required: true
    description: |
      做出此决策时的背景和问题陈述。
      例："我们需要选择 API 认证方式，候选方案为 JWT 和 Session"
    ui_hint: "做决策时的背景是什么？"

  decision_content:
    type: string
    required: true
    description: |
      做出的具体决策（选择了什么）。
      例："选择 JWT 而非 Session，原因：无状态适合水平扩展"
    ui_hint: "最终选择了什么？"

  consequences:
    type: list[string]
    required: false
    default: []
    description: |
      此决策带来的后果（正面和负面）列表。
      例: ["✅ 水平扩展容易", "⚠️ Token 无法主动吊销需额外实现黑名单"]
    ui_hint: "该决策有哪些已知的后果/影响？"

  alternatives_considered:
    type: list[string]
    required: false
    default: []
    description: |
      考虑过但被否决的备选方案列表。
      例: ["Session + Redis（有状态，不适合云原生）"]
    ui_hint: "考虑过哪些其他选项？为什么没选？"

  superseded_by:
    type: string
    required: false
    description: "若 status=superseded，指向新决策的 ID"

  decision_makers:
    type: list[string]
    required: false
    default: []
    description: "做出该决策的相关人员或角色"

validation_rules:
  - rule_id: context_not_empty
    check: "len(context.strip()) > 5"
    severity: error
    message: "Decision 的 context 字段不能为空"

  - rule_id: decision_content_not_empty
    check: "len(decision_content.strip()) > 5"
    severity: error
    message: "Decision 的 decision_content 字段不能为空"

  - rule_id: superseded_needs_successor
    check: "status != 'superseded' OR superseded_by is not None"
    severity: warning
    message: "状态为 superseded 的 Decision 应通过 superseded_by 指向新决策"
