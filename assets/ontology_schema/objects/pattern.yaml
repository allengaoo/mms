# ObjectTypeDef: Pattern — 可复用的代码/架构模式
# ─────────────────────────────────────────────────────────────────
# 替代 MemoryNode(type=pattern)，成为独立的 ObjectType。
# 继承 _memory_base.yaml 中的基础属性。
#
# 版本：v5.0 | 重构于：2026-05-05 | 从 MemoryNode God Object 拆分
# 前缀：PAT-（人工写）/ MEM-BOOT-（bootstrap 自动生成）

id: Pattern
label: "可复用架构/代码模式"
type: object
version: "5.0"
extends: "_memory_base"

declared_principles:
  - P1_density_over_completeness
  - P4_focused_object_types
principle_notes: |
  从 MemoryNode God Object 拆分，专注表达可复用模式。
  Pattern 的 problem/solution/context 字段是必填的，与 Decision/AntiPattern 完全不同。
  空值率预期 < 15%（相比 MemoryNode 的 ~80% 大幅改善）。

description: |
  描述一个可复用的代码或架构模式。
  经典的 Pattern 包含 4 个要素（Christopher Alexander 模式语言）：
    problem:  在什么情形下出现的问题
    solution: 如何解决这个问题（不含具体代码，只描述结构或决策）
    context:  该模式适用的场景约束
    forces:   设计时需要权衡的力量（trade-off）

primary_key: "id"

backing_storage:
  type: markdown_frontmatter
  path_pattern: "docs/memory/shared/{layer}/PAT-*.md OR MEM-BOOT-*.md"
  populated_by: ["action_bootstrap", "action_distill", "manual"]

# ── Pattern 特有的核心属性（非基础属性）────────────────────────────────────────
specific_properties:

  problem:
    type: string
    required: false
    description: |
      该模式解决的核心问题（一段描述）。
      例："微服务之间的幂等性保证问题"
    ui_hint: "在什么情况下会遇到此问题？"

  solution:
    type: string
    required: false
    description: |
      解决方案的结构描述（不是具体代码，而是决策/机制的描述）。
      例："使用幂等键（Idempotency-Key）+ 数据库唯一约束"
    ui_hint: "如何解决？核心机制是什么？"

  context:
    type: string
    required: false
    description: |
      此模式适用的上下文约束。
      例："仅适用于 HTTP POST 请求；数据库需支持 UPSERT"
    ui_hint: "在什么场景下适用？有哪些前提条件？"

  forces:
    type: list[string]
    required: false
    default: []
    description: |
      设计时需要权衡的力量（trade-off）列表。
      例: ["可靠性 vs 性能", "存储空间 vs 重试安全"]
    ui_hint: "有哪些需要权衡的因素？"

  code_example:
    type: string
    required: false
    description: "具体的代码示例（可选，Markdown 代码块格式）"

  known_uses:
    type: list[string]
    required: false
    default: []
    description: "已知在哪些项目/文件中使用了此模式"

validation_rules:
  - rule_id: title_not_empty
    check: "len(title.strip()) > 0"
    severity: error

  - rule_id: has_solution_or_code_example
    check: "solution is not None OR code_example is not None"
    severity: warning
    message: "Pattern 应有 solution 或 code_example 描述，否则对 LLM 的信息密度贡献有限"
