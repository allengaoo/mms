# ObjectTypeDef: MemoryNode — 记忆图节点（Layer 2 核心对象）
# ─────────────────────────────────────────────────────────────
# 这是 MMS 记忆本体图（Layer 2）的核心节点类型，代表系统积累的
# 一条结构化知识。MemoryNode 通过 LinkType 与其他节点建立语义关系，
# 构成可遍历的知识图谱索引。
#
# 子类型（通过 type 字段区分）：
#   - lesson       从执行失败/成功中提炼的经验教训
#   - pattern      可复用的代码/架构模式
#   - decision     架构决策记录（ADR）
#   - anti-pattern 反模式（需要避免的做法）
#   - business-flow 业务流程文档
#
# 版本：v4.0 | 重构于：2026-04-25 | 分层净化

id: MemoryNode
label: "记忆图节点"
type: object
layer: L2_memory_graph
version: "4.0"

description: |
  MMS 记忆本体图（Layer 2）的核心实体。
  每个 MemoryNode 代表一条结构化知识，通过以下 LinkType 连接到图中其他节点：
    cites       → CodeFile（引用的代码文件）
    about       → DomainConcept（描述的领域概念）
    impacts     → MemoryNode（变更时需检查的关联记忆）
    contradicts → MemoryNode（与之矛盾的记忆）
    derived_from→ MemoryNode（从哪条记忆提炼而来）

primary_key: "id"

properties:
  id:
    type: string
    required: true
    pattern: "^(MEM-L-|MEM-BOOT-|AD-|BIZ-|ENV-|MEM-DB-)[0-9A-Z-]+"
    description: "记忆唯一 ID（MEM-BOOT- 为 bootstrap 自动生成节点保留前缀）"

  type:
    type: string
    required: true
    enum: [lesson, pattern, decision, anti-pattern, business-flow]

  tier:
    type: string
    required: true
    enum: [hot, warm, cold, archive]
    description: "访问热度层级，驱动 GC 和检索优先级"

  layer:
    type: string
    required: true
    description: "架构层归属（通用 v5.0 层 ID，参考 universal_layers.yaml）"
    enum_source: "assets/ontology_schema/_config/universal_layers.yaml"
    enum:
      # ── 通用 v5.0 层 ID（Schema Source of Truth = universal_layers.yaml）──
      - ADAPTER        # 接口/适配层（Controller/Handler/Router/前端页面）
      - APP            # 应用服务层（Service/UseCase/Orchestrator/Worker）
      - DOMAIN         # 领域层（Entity/Aggregate/Repository接口）
      - PLATFORM       # 平台层（DB/Cache/MQ/Config/Auth等基础设施）
      - CC             # 横切关注点（Util/Exception/Base/常量）
      - CC_testing     # 横切测试层
      - CC_governance  # 横切治理层（RBAC/ACL/Quota）
      - BIZ            # 跨层业务流
      - Ops            # 运维部署层
      # ── 向后兼容（v4.x 项目特化 ID，迁移期内有效，新文件禁止使用）──
      # 迁移脚本：scripts/migrate_layer_v4_to_v5.py
      - L5_api
      - L5_frontend
      - L4_service
      - L4_worker
      - L3_ontology
      - L3_data_pipeline
      - L2_database
      - L2_messaging
      - L2_cache
      - L2_storage
      - L1_security
      - L1_platform
      - L2_infrastructure
      - L3_domain
      - L4_application
      - L5_interface
      - CC_architecture
      - Tooling_mms

  tags:
    type: list[string]
    required: true

  # ── 元数据字段（与 memory_schema.yaml front-matter 对齐）──────────

  module:
    type: string
    required: false
    description: "层内模块（如 api、ontology、messaging、frontend）"

  source_ep:
    type: string
    required: false
    description: "产生本记忆的 EP 编号"

  created_at:
    type: date
    required: false
    format: "YYYY-MM-DD"

  version:
    type: integer
    required: false
    default: 1
    description: "记忆版本号，内容重大更新时递增"

  last_accessed:
    type: date
    required: false
    description: "最后一次被检索引用的日期（GC 依赖此字段）"

  access_count:
    type: integer
    required: false
    default: 0

  also_in:
    type: list[string]
    required: false
    description: "本记忆同时适用的其他层（软链接）"

  generalized:
    type: boolean
    required: false
    default: false
    description: "是否已泛化（可跨项目复用）"

  dimension:
    type: string
    required: false
    description: "细粒度维度标签（如 architecture、security、performance）"

  provenance:
    type: object
    required: false
    description: "记忆来源元数据（bootstrap 自动生成时填充）"
    fields:
      trigger_type:
        type: string
        description: "生成触发类型（bootstrap_v2 / distill / dream / manual）"
      generated_at:
        type: date
      layer_confidence:
        type: float
        description: "层推断置信度（仅 bootstrap 生成节点有值）"

  # ── Layer 2 图边字段（LinkType 实例存储） ──────────────────

  cites_files:
    type: list[string]
    required: false
    default: []
    link_type: link_cites
    description: "引用的代码文件路径列表（由 _auto_link 自动填充）"

  about_concepts:
    type: list[string]
    required: false
    default: []
    link_type: link_about
    description: "描述的领域概念 ID 列表（由 _auto_link 关键词匹配填充）"

  impacts:
    type: list[string]
    required: false
    default: []
    link_type: link_impacts
    description: "变更时需同步检查的记忆 ID 列表"

  contradicts:
    type: list[string]
    required: false
    default: []
    link_type: link_contradicts
    description: "与之存在矛盾的记忆 ID 列表"

  derived_from:
    type: list[string]
    required: false
    default: []
    link_type: link_derived_from
    description: "本记忆从哪些记忆提炼而来"

  related_to:
    type: list[object]
    required: false
    default: []
    description: "通用语义相关记忆（保留，向后兼容 v3 格式）"
    item_schema:
      id: "记忆 ID"
      reason: "关联原因说明"

  ast_pointer:
    type: object
    required: false
    description: "代码物理绑定（EP-130，与 cites_files 互补）"
    fields:
      file_path: string
      class_name: string
      fingerprint: string
      drift: boolean

related_link_types:
  - link_cites
  - link_about
  - link_impacts
  - link_contradicts
  - link_derived_from

related_functions:
  - fn_rank_memories
  - fn_detect_drift
  - fn_find_contradictions

related_actions:
  - action_distill
  - action_dream
  - action_retire_memory
  - action_promote_draft
