# ObjectTypeDef: AntiPattern — 已知的代码/架构反模式
# ─────────────────────────────────────────────────────────────────
# 替代 MemoryNode(type=anti-pattern)，成为独立的 ObjectType。
# 继承 _memory_base.yaml 中的基础属性。
#
# 版本：v5.0 | 创建于：2026-05-05 | 从 MemoryNode God Object 拆分
# 前缀：ANTI-
# 说明：AntiPattern 比 Pattern 多一个"负面结果"字段，并记录"重构路径"

id: AntiPattern
label: "已知代码/架构反模式"
type: object
version: "5.0"
extends: "_memory_base"

declared_principles:
  - P1_density_over_completeness
  - P4_focused_object_types
principle_notes: |
  从 MemoryNode God Object 拆分，专注记录应当避免的反模式。
  AntiPattern 与 Pattern 的区别：
    Pattern  = "应该这样做"（正向指导）
    AntiPattern = "不要这样做 + 问题所在 + 如何重构"（负向警告）
  LLM 在代码生成时会优先规避已知的 AntiPattern。

description: |
  记录一个已知的代码或架构反模式：描述它的表现、危害，
  以及如何识别和重构。
  LLM 使用此信息在代码审查和生成时主动规避这类问题。

primary_key: "id"

backing_storage:
  type: markdown_frontmatter
  path_pattern: "docs/memory/shared/{layer}/ANTI-*.md"
  populated_by: ["action_distill", "manual"]

# ── AntiPattern 特有的核心属性 ───────────────────────────────────────────────
specific_properties:

  problem_description:
    type: string
    required: true
    description: |
      反模式的表现和问题所在。
      例："God Class 把所有业务逻辑集中在一个类里，导致高耦合低内聚"
    ui_hint: "该反模式的具体表现是什么？为什么有问题？"

  negative_consequences:
    type: list[string]
    required: false
    default: []
    description: |
      使用该反模式导致的负面后果列表。
      例: ["单元测试困难", "修改一处影响全局", "新人理解成本高"]
    ui_hint: "会导致哪些具体问题？"

  detection_signals:
    type: list[string]
    required: false
    default: []
    description: |
      如何识别代码中存在此反模式的信号/特征。
      例: ["单个类超过 500 行", "一个 Service 注入了超过 5 个 Repository"]
    ui_hint: "如何在代码中识别它？"

  refactoring_path:
    type: string
    required: false
    description: |
      如何从反模式重构到正确模式的路径描述。
      例："提取职责到多个 Service，依照 DDD Aggregate 边界拆分"
    ui_hint: "如何重构修复这个问题？"

  related_pattern:
    type: string
    required: false
    description: "该反模式的正向对应 Pattern（若存在）的 ID"

severity:
    type: string
    required: false
    enum: [critical, high, medium, low]
    default: medium
    description: "严重程度（影响代码可维护性的程度）"

validation_rules:
  - rule_id: problem_not_empty
    check: "len(problem_description.strip()) > 5"
    severity: error
    message: "AntiPattern 的 problem_description 不能为空"

  - rule_id: should_have_detection_or_refactoring
    check: "len(detection_signals) > 0 OR refactoring_path is not None"
    severity: warning
    message: "AntiPattern 至少应有 detection_signals 或 refactoring_path 之一"
